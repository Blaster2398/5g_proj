<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5G Smart Parking System</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h1>5G Smart Parking Dashboard</h1>
    
    <div class="controls">
        <button id="btn-baseline" class="btn-base">Baseline (ROI Ref)</button>
        
        <div class="frame-nav">
            <button id="btn-prev" class="btn-nav">&lt; Prev</button>
            <span id="frame-indicator" class="nav-text">Frame 1</span>
            <button id="btn-next" class="btn-nav">Next &gt;</button>
        </div>

        <button id="btn-live-poll" class="btn btn-primary">Watch Live Polling</button>
        <button id="btn-set-entry" class="btn-set">Set Entry</button>
        <button id="btn-set-exit" class="btn-set">Set Exit</button>
    </div>

    <div class="video-container">
        <img id="dashboard-feed" src="" alt="Live Parking Feed">
    </div>
    
    <p id="summary">Loading slot summary...</p>
    <p id="mode">Point mode: none</p>
    <div id="paths">Loading route details...</div>

    <script>
        const IS_LIVE_MODE = {{ is_live }};
    </script>
    <script src="/static/js/main.js"></script>
</body>
</html>
